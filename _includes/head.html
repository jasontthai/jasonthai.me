    * {
      color-scheme: light dark
    }

    :root {
      --color: #333;
      --link-color: #0066cc;
      --bg-color: #fffef0;

      --default-color: #000;
      --default-link-color: #000;
      --default-bg-color: #FFF;

      --red-color: #584140;
      --red-link-color: #C00021;
      --red-bg-color: #FFDAD7;

      --green-color: #dae5e1;
      --green-link-color: #00dec9;
      --green-bg-color: #101918;

      --orange-color: #2d1600;
      --orange-link-color: #8b5000;
      --orange-bg-color: #ffdcbe;

      --yellow-color: #E7E3D0;
      --yellow-link-color: #f5e700;
      --yellow-bg-color: #19180d;

      --notebook-color: #333;
      --notebook-link-color: #d14;
      --notebook-bg-color: #fffef0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --default-color: #FFF;
        --default-link-color: #FFF;
        --default-bg-color: #000;
      }
    }

    body {
      color: var(--color);
      background-color: var(--bg-color);
      font-family: 'Patrick Hand', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;
      font-size: 1.5rem;
      line-height: 1.8rem;
      margin: auto;
      max-width: 8in;
      overflow-wrap: break-word;
      padding: 0 1rem;
    }

    .post-metadata {
      border-inline-start: 4px solid;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
    }

    .notebook-theme body {
      background-attachment: scroll;
      background-image: 
        linear-gradient(90deg, transparent 6rem, #ffb1b1 6rem, #ffb1b1 6.1rem, transparent 6.1rem),
        linear-gradient(#d1e1e1 1px, transparent 1px);
      background-repeat: repeat-y, repeat;
      background-size: auto, 100% 1.8rem;
    }

    @media (max-width: 1000px) {
      .notebook-theme body {
        /* We keep the horizontal lines but remove the vertical red one */
        background-image: 
          none, 
          linear-gradient(#d1e1e1 1px, transparent 1px);
      }
    }

    h1, h2, h3 {
      line-height: 1.2;
    }

    a {
      color: var(--link-color);
    }

    a:hover {
      background-color: var(--link-color);
      color: var(--bg-color);
    }

    nav>a {
      --nav-margin: 2rem;
      display: inline-block;
      font-size: 1.25rem;
      padding: 0.5rem 0;
      margin-right: var(--nav-margin);
    }

    .notebook-theme a:hover {
      margin: 0 -0.4em;
      padding: 0.1em 0.4em;
      border-radius: 0.8em 0.3em;
      background-color: transparent;
      color: var(--link-color);
      --highlight-color: #fde047;
      --fade-percent: 50%;
      background-image: linear-gradient(to right,
          var(--highlight-color) 0%,
          var(--highlight-color) var(--fade-percent),
          transparent 100%
      );
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      display: inline;
    }

    .notebook-theme nav>a:hover {
      margin-right: calc(var(--nav-margin) - 0.4em);
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }

    img {
      border-radius: 8px;
      margin: 20px 0;
      max-width: 100%;
    }

    .tb {
      border: none;
      border-radius: 50%;
      cursor: pointer;
      margin: 0 8px;
      height: 24px;
      width: 24px;
    }
  </style>
  <script>
    const t = localStorage.getItem('theme') ? localStorage.getItem('theme') : 'notebook';
    if (t) {
      u(t);
    }
    window.matchMedia('(prefers-color-scheme: dark)').addListener(function (e) {
      const t = localStorage.getItem('theme') ? localStorage.getItem('theme') : 'notebook';
      u(t);
    });
    function c(color) {
      const r = document.querySelector(':root');
      const rs = getComputedStyle(r);
      const d = rs.getPropertyValue(`--${color}-color`) || rs.getPropertyValue(`--default-color`);
      const b = rs.getPropertyValue(`--${color}-bg-color`) || rs.getPropertyValue(`--default-bg-color`);
      const l = rs.getPropertyValue(`--${color}-link-color`) || rs.getPropertyValue(`--default-link-color`);
      return [d, b, l];
    }
    function u(color) {
      const r = document.querySelector(':root');
      let colors = c(color);
      r.style.setProperty('--color', colors[0]);
      r.style.setProperty('--bg-color', colors[1]);
      r.style.setProperty('--link-color', colors[2]);
      if (color === 'notebook') {
        document.documentElement.classList.add('notebook-theme');
      } else {
        document.documentElement.classList.remove('notebook-theme');
      }
    }
  </script>
</head>
